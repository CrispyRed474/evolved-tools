<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolved Floors — Floor Visualiser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; cursor: none; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.7); font-family: 'Helvetica Neue', sans-serif;
    font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    text-align: center; pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  #info .product-name { font-size: 20px; font-weight: 300; color: #fff; margin-bottom: 4px; }
  #info .pattern-type { font-size: 11px; color: rgba(255,255,255,0.5); }
  #calibration {
    position: fixed; top: 20px; right: 20px;
    color: rgba(255,255,255,0.4); font-family: monospace; font-size: 11px;
    text-align: right;
  }
  #instructions {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.6); font-family: 'Helvetica Neue', sans-serif;
    font-size: 16px; text-align: center; line-height: 2;
    transition: opacity 1s; pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="floor"></canvas>
<div id="info">
  <div class="product-name" id="pname"></div>
  <div class="pattern-type" id="ptype"></div>
</div>
<div id="calibration" id="calib"></div>
<div id="instructions">
  ← → Arrow keys to change product<br>
  + / − to calibrate scale<br>
  F to toggle fullscreen<br>
  <span style="font-size:12px;opacity:0.5">Tablet remote: open floor-remote on your device</span>
</div>

<script>
const PRODUCTS = [
  { name: "Natural Oak",              color: "#C4A882", grainDark: "#B09060", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Warm Blonde",              color: "#D4B896", grainDark: "#C0A070", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Coastal Grey",             color: "#A8A49E", grainDark: "#948E88", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Dark Walnut",              color: "#5C3D2E", grainDark: "#4A2E20", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Charcoal",                 color: "#4A4A4A", grainDark: "#383838", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Smoked Oak",               color: "#7A6A58", grainDark: "#665848", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Natural Oak — Herringbone",color: "#C4A882", grainDark: "#B09060", plankW: 90,  plankL: 450,  pattern: "herringbone" },
  { name: "Warm Blonde — Herringbone",color: "#D4B896", grainDark: "#C0A070", plankW: 90,  plankL: 450,  pattern: "herringbone" },
  { name: "Dark Walnut — Herringbone",color: "#5C3D2E", grainDark: "#4A2E20", plankW: 90,  plankL: 450,  pattern: "herringbone" },
  { name: "Natural Oak — Chevron",    color: "#C4A882", grainDark: "#B09060", plankW: 90,  plankL: 450,  pattern: "chevron" },
  { name: "Warm Blonde — Chevron",    color: "#D4B896", grainDark: "#C0A070", plankW: 90,  plankL: 450,  pattern: "chevron" },
  { name: "Dark Walnut — Chevron",    color: "#5C3D2E", grainDark: "#4A2E20", plankW: 90,  plankL: 450,  pattern: "chevron" },
];

// PX per MM — calibrate with + / - keys
// 96dpi = 3.78px/mm. Adjust until projected plank = real plank size.
let pxPerMm = parseFloat(localStorage.getItem('ef_pxPerMm') || '3.78');
let currentIdx = parseInt(localStorage.getItem('ef_product') || '0');
let instructionsVisible = true;

const canvas = document.getElementById('floor');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}

// Seeded random for consistent grain per plank position
function seededRand(seed) {
  let x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function drawPlank(ctx, x, y, w, h, color, darkColor, seed, angle=0) {
  ctx.save();
  if (angle !== 0) {
    ctx.translate(x + w/2, y + h/2);
    ctx.rotate(angle * Math.PI / 180);
    ctx.translate(-w/2, -h/2);
    x = 0; y = 0;
  }

  // Base colour with slight variation per plank
  const variation = (seededRand(seed) - 0.5) * 0.08;
  const rgb = hexToRgb(color);
  const r = Math.min(255, Math.max(0, rgb.r + rgb.r * variation));
  const g = Math.min(255, Math.max(0, rgb.g + rgb.g * variation));
  const b = Math.min(255, Math.max(0, rgb.b + rgb.b * variation));
  ctx.fillStyle = `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
  ctx.fillRect(x, y, w, h);

  // Grain lines
  const darkRgb = hexToRgb(darkColor);
  const numGrainLines = Math.floor(3 + seededRand(seed + 99) * 6);
  for (let i = 0; i < numGrainLines; i++) {
    const gx = x + seededRand(seed + i * 7) * w;
    const alpha = 0.08 + seededRand(seed + i * 13) * 0.12;
    ctx.strokeStyle = `rgba(${darkRgb.r},${darkRgb.g},${darkRgb.b},${alpha})`;
    ctx.lineWidth = 0.5 + seededRand(seed + i) * 1;
    ctx.beginPath();
    // Slight curve to grain line
    const wobble = (seededRand(seed + i * 3) - 0.5) * w * 0.1;
    ctx.moveTo(gx + wobble, y);
    ctx.bezierCurveTo(
      gx + wobble * 0.5, y + h * 0.33,
      gx - wobble * 0.5, y + h * 0.66,
      gx - wobble, y + h
    );
    ctx.stroke();
  }

  ctx.restore();
}

function drawStraight(p) {
  const pw = p.plankW * pxPerMm;
  const pl = p.plankL * pxPerMm;
  const grout = 1.5;
  const W = canvas.width, H = canvas.height;

  // Offset rows for staggered look (brick pattern)
  const rowOffset = pl * 0.4;

  for (let row = -1; row < Math.ceil(H / pw) + 1; row++) {
    const y = row * (pw + grout);
    const offset = (row % 2 === 0) ? 0 : rowOffset;
    for (let col = -1; col < Math.ceil(W / pl) + 2; col++) {
      const x = col * (pl + grout) - offset;
      const seed = row * 1000 + col;
      drawPlank(ctx, x, y, pl - grout, pw - grout, p.color, p.grainDark, seed);
    }
  }
}

function drawHerringbone(p) {
  const pw = p.plankW * pxPerMm;
  const pl = p.plankL * pxPerMm;
  const grout = 1.5;
  const W = canvas.width, H = canvas.height;

  // Herringbone unit = pl × pl square (two planks)
  const unit = pl;
  const cols = Math.ceil(W / unit) + 4;
  const rows = Math.ceil(H / unit) + 4;

  for (let row = -2; row < rows; row++) {
    for (let col = -2; col < cols; col++) {
      const bx = col * unit;
      const by = row * unit;
      const seed1 = row * 2000 + col * 2;
      const seed2 = row * 2000 + col * 2 + 1;

      // Horizontal plank (left of unit)
      ctx.save();
      ctx.translate(bx, by);
      drawPlank(ctx, 0, 0, pl - grout, pw - grout, p.color, p.grainDark, seed1);
      ctx.restore();

      // Vertical plank (right of unit, rotated 90deg)
      ctx.save();
      ctx.translate(bx + pl, by);
      ctx.rotate(Math.PI / 2);
      drawPlank(ctx, 0, -pw + grout, pl - grout, pw - grout, p.color, p.grainDark, seed2);
      ctx.restore();
    }
  }
}

function drawChevron(p) {
  const pw = p.plankW * pxPerMm;
  const pl = p.plankL * pxPerMm;
  const grout = 1.5;
  const W = canvas.width, H = canvas.height;

  const angle = 45;
  const unitW = pl * Math.cos(angle * Math.PI / 180);
  const unitH = pl * Math.sin(angle * Math.PI / 180);
  const cols = Math.ceil(W / (unitW * 2)) + 4;
  const rows = Math.ceil(H / (pw * 2)) + 4;

  for (let row = -2; row < rows + 2; row++) {
    for (let col = -2; col < cols + 2; col++) {
      const seed1 = row * 3000 + col * 2;
      const seed2 = row * 3000 + col * 2 + 1;

      // Left-leaning plank
      ctx.save();
      ctx.translate(col * unitW * 2, row * (unitH + pw * Math.cos(angle * Math.PI / 180)));
      ctx.rotate(angle * Math.PI / 180);
      drawPlank(ctx, 0, 0, pl - grout, pw - grout, p.color, p.grainDark, seed1);
      ctx.restore();

      // Right-leaning plank
      ctx.save();
      ctx.translate(col * unitW * 2 + unitW, row * (unitH + pw * Math.cos(angle * Math.PI / 180)));
      ctx.rotate(-angle * Math.PI / 180);
      drawPlank(ctx, 0, -pw + grout, pl - grout, pw - grout, p.color, p.grainDark, seed2);
      ctx.restore();
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const p = PRODUCTS[currentIdx];

  if (p.pattern === 'straight') drawStraight(p);
  else if (p.pattern === 'herringbone') drawHerringbone(p);
  else if (p.pattern === 'chevron') drawChevron(p);

  // Update info
  document.getElementById('pname').textContent = p.name;
  const patternLabel = p.pattern.charAt(0).toUpperCase() + p.pattern.slice(1) + ' lay';
  document.getElementById('ptype').textContent = `${p.plankW}mm × ${p.plankL}mm — ${patternLabel}`;
  document.getElementById('calibration').textContent = `Scale: ${pxPerMm.toFixed(2)}px/mm | Product ${currentIdx+1}/${PRODUCTS.length}`;
}

function setProduct(idx) {
  currentIdx = ((idx % PRODUCTS.length) + PRODUCTS.length) % PRODUCTS.length;
  localStorage.setItem('ef_product', currentIdx);
  // Hide instructions after first interaction
  if (instructionsVisible) {
    document.getElementById('instructions').style.opacity = '0';
    setTimeout(() => document.getElementById('instructions').style.display = 'none', 1000);
    instructionsVisible = false;
  }
  draw();
}

// Keyboard controls
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') setProduct(currentIdx + 1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') setProduct(currentIdx - 1);
  else if (e.key === '+' || e.key === '=') { pxPerMm = Math.min(8, pxPerMm + 0.1); localStorage.setItem('ef_pxPerMm', pxPerMm); draw(); }
  else if (e.key === '-') { pxPerMm = Math.max(1, pxPerMm - 0.1); localStorage.setItem('ef_pxPerMm', pxPerMm); draw(); }
  else if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// WebSocket — listens for tablet remote commands
function connectWS() {
  // Try to connect to local relay server
  const ws = new WebSocket('ws://localhost:8765');
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.action === 'next') setProduct(currentIdx + 1);
      else if (msg.action === 'prev') setProduct(currentIdx - 1);
      else if (msg.action === 'set' && msg.index !== undefined) setProduct(msg.index);
    } catch(err) {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000); // auto-reconnect
}
connectWS();

// Auto-hide instructions after 5s
setTimeout(() => {
  if (instructionsVisible) {
    document.getElementById('instructions').style.opacity = '0';
    setTimeout(() => document.getElementById('instructions').style.display = 'none', 1000);
    instructionsVisible = false;
  }
}, 6000);

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
