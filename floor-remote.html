<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Floor Remote — Evolved Floors</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #111; color: #fff;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    min-height: 100vh; padding-bottom: 20px;
  }
  header {
    background: #1a1a1a; padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10;
  }
  header .logo { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; }
  header .status { font-size: 11px; color: #555; }
  header .status.connected { color: #4CAF50; }

  .nav-bar {
    display: flex; gap: 0; padding: 12px 16px;
    position: sticky; top: 57px; background: #111; z-index: 9;
    border-bottom: 1px solid #222;
  }
  .nav-btn {
    flex: 1; padding: 14px; background: #222; border: none; color: #fff;
    font-size: 22px; cursor: pointer; transition: background 0.15s;
    border-radius: 8px; margin: 0 4px;
  }
  .nav-btn:active { background: #444; }

  .section-title {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: #555; padding: 16px 16px 8px;
  }

  .product-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px;
  }

  .product-btn {
    background: #1e1e1e; border: 2px solid #2a2a2a; border-radius: 12px;
    padding: 14px 12px; cursor: pointer; transition: all 0.15s; text-align: left;
    display: flex; flex-direction: column; gap: 8px;
  }
  .product-btn:active { background: #2a2a2a; transform: scale(0.97); }
  .product-btn.active {
    border-color: #C4A882; background: #2a2218;
  }

  .swatch {
    width: 100%; height: 48px; border-radius: 6px;
    position: relative; overflow: hidden;
  }
  .swatch-inner {
    width: 100%; height: 100%;
  }

  .product-name {
    font-size: 13px; font-weight: 500; color: #eee; line-height: 1.3;
  }
  .product-meta {
    font-size: 10px; color: #666; letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .pattern-tag {
    display: inline-block; font-size: 9px; padding: 2px 6px;
    border-radius: 4px; letter-spacing: 1px; text-transform: uppercase;
    margin-top: 2px;
  }
  .pattern-straight { background: #1a2a1a; color: #4a8a4a; }
  .pattern-herringbone { background: #1a1a2a; color: #4a4a8a; }
  .pattern-chevron { background: #2a1a2a; color: #8a4a8a; }

  .config-section { padding: 20px 16px 0; }
  .config-label { font-size: 11px; color: #555; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .config-input {
    background: #1e1e1e; border: 1px solid #333; color: #fff;
    padding: 10px 12px; border-radius: 8px; font-size: 14px; width: 100%;
    outline: none;
  }
  .config-input:focus { border-color: #555; }
  .connect-btn {
    width: 100%; margin-top: 8px; padding: 12px;
    background: #333; border: none; color: #aaa; border-radius: 8px;
    font-size: 13px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
  }
  .connect-btn:active { background: #444; }
</style>
</head>
<body>

<header>
  <div class="logo">Evolved Floors</div>
  <div class="status" id="status">● Connecting...</div>
</header>

<div class="nav-bar">
  <button class="nav-btn" onclick="sendCmd('prev')" title="Previous">←</button>
  <button class="nav-btn" onclick="sendCmd('next')" title="Next">→</button>
</div>

<div class="section-title">Straight Lay</div>
<div class="product-grid" id="straight-grid"></div>

<div class="section-title">Herringbone</div>
<div class="product-grid" id="herringbone-grid"></div>

<div class="section-title">Chevron</div>
<div class="product-grid" id="chevron-grid"></div>

<div class="config-section">
  <div class="config-label">Display PC address</div>
  <input class="config-input" id="ws-host" placeholder="e.g. 192.168.1.100" />
  <button class="connect-btn" onclick="reconnect()">Reconnect</button>
</div>

<script>
const PRODUCTS = [
  { name: "Natural Oak",              color: "#C4A882", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Warm Blonde",              color: "#D4B896", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Coastal Grey",             color: "#A8A49E", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Dark Walnut",              color: "#5C3D2E", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Charcoal",                 color: "#4A4A4A", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Smoked Oak",               color: "#7A6A58", plankW: 180, plankL: 1800, pattern: "straight" },
  { name: "Natural Oak",              color: "#C4A882", plankW: 90,  plankL: 450,  pattern: "herringbone" },
  { name: "Warm Blonde",              color: "#D4B896", plankW: 90,  plankL: 450,  pattern: "herringbone" },
  { name: "Dark Walnut",              color: "#5C3D2E", plankW: 90,  plankL: 450,  pattern: "herringbone" },
  { name: "Natural Oak",              color: "#C4A882", plankW: 90,  plankL: 450,  pattern: "chevron" },
  { name: "Warm Blonde",              color: "#D4B896", plankW: 90,  plankL: 450,  pattern: "chevron" },
  { name: "Dark Walnut",              color: "#5C3D2E", plankW: 90,  plankL: 450,  pattern: "chevron" },
];

let ws = null;
let currentIdx = 0;
let wsHost = localStorage.getItem('ef_ws_host') || 'localhost';

function buildGrid() {
  ['straight','herringbone','chevron'].forEach(pattern => {
    const grid = document.getElementById(pattern + '-grid');
    grid.innerHTML = '';
    PRODUCTS.forEach((p, i) => {
      if (p.pattern !== pattern) return;
      const btn = document.createElement('div');
      btn.className = 'product-btn' + (i === currentIdx ? ' active' : '');
      btn.id = 'btn-' + i;
      btn.onclick = () => sendCmd('set', i);

      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.innerHTML = `<canvas class="swatch-inner" id="swatch-${i}"></canvas>`;

      const nameEl = document.createElement('div');
      nameEl.className = 'product-name';
      nameEl.textContent = p.name;

      const metaEl = document.createElement('div');
      metaEl.className = 'product-meta';
      metaEl.textContent = `${p.plankW} × ${p.plankL}mm`;

      const tagEl = document.createElement('span');
      tagEl.className = `pattern-tag pattern-${p.pattern}`;
      tagEl.textContent = p.pattern;

      btn.appendChild(swatch);
      btn.appendChild(nameEl);
      btn.appendChild(metaEl);
      btn.appendChild(tagEl);
      grid.appendChild(btn);
    });
  });

  // Draw mini swatches
  PRODUCTS.forEach((p, i) => {
    const c = document.getElementById('swatch-' + i);
    if (!c) return;
    const ctx = c.getContext('2d');
    c.width = c.offsetWidth || 120;
    c.height = 48;
    ctx.fillStyle = p.color;
    ctx.fillRect(0, 0, c.width, c.height);
    // Grain lines
    for (let j = 0; j < 8; j++) {
      const x = (j / 8) * c.width + (Math.sin(j * 3.7) * 8);
      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + 4, c.height);
      ctx.stroke();
    }
  });
}

function setActive(idx) {
  document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + idx);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  currentIdx = idx;
}

function sendCmd(action, index) {
  if (action === 'set') setActive(index);
  if (!ws || ws.readyState !== 1) return;
  const msg = index !== undefined ? {action, index} : {action};
  ws.send(JSON.stringify(msg));
}

function reconnect() {
  wsHost = document.getElementById('ws-host').value || 'localhost';
  localStorage.setItem('ef_ws_host', wsHost);
  if (ws) ws.close();
  connect();
}

function connect() {
  const statusEl = document.getElementById('status');
  statusEl.textContent = '● Connecting...';
  statusEl.className = 'status';

  ws = new WebSocket(`ws://${wsHost}:8765`);
  ws.onopen = () => {
    statusEl.textContent = '● Connected';
    statusEl.className = 'status connected';
  };
  ws.onclose = () => {
    statusEl.textContent = '● Disconnected';
    statusEl.className = 'status';
    setTimeout(connect, 3000);
  };
  ws.onerror = () => {
    statusEl.textContent = '● No connection';
    statusEl.className = 'status';
  };
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.active !== undefined) setActive(msg.active);
    } catch(err) {}
  };
}

document.getElementById('ws-host').value = wsHost;
buildGrid();
connect();
</script>
</body>
</html>
